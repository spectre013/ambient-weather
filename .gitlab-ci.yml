before_script:
  - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

stages:
  - scan
  - build docker
  - deploy

ui:
  stage: build docker
  script:
    - cd weather-ui
    - docker build -t $DOCKER_REGISTRY/weather/weather-ui:v3.0.5 .
    - docker push $DOCKER_REGISTRY/weather/weather-ui:v3.0.5


server:
  stage: build docker
  script:
    - cd weather-server
    - docker build -t $DOCKER_REGISTRY/weather/weather-server:v4.0.5 . --no-cache
    - docker push $DOCKER_REGISTRY/weather/weather-server:v4.0.5

transfer:
  stage: build docker
  script:
    - cd weather-transfer
    - docker build -t $DOCKER_REGISTRY/weather/weather-transfer:2.1.2 . --no-cache
    - docker push $DOCKER_REGISTRY/weather/weather-transfer:2.1.2


deploy:
  stage: deploy
  script: -|
    sed -i "s/WEATHER_API=/WEATHER_API=$WEATHERAPI/g" docker-compose.yml
    sed -i "s/DB_PASSWORD=/DB_PASSWORD=$DB_PASSWORD/g" docker-compose.yml
    scp docker-compose.yml ghost:/opt/weather
    ssh ghost "cd /opt/weather/ && docker-compose down && docker-compose up -d
    git reset --hard
  rules:
    - changes:
        - docker-compose.yml
      when: on_success