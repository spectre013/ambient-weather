<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Default-Style" content="blue">
    <meta content="Ambient WS-2000 Weather station" name="description">
    <meta content="website" property="og:type">
    <meta content="7 days" name="revisit-after">
    <meta content="web" name="distribution">
    <meta content="Lorson Ranch, Colorado Springs, CO" property="og:title">
    <meta content="Lorson Ranch, Colorado Springs, CO" property="og:site_name">
    <meta content="Ambient WS-2000 Weather station Lorson Ranch, Colorado Springs, CO" property="og:description">
    <meta content="place" property="og:type">
    <meta content="INDEX,FOLLOW" name="robots">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Lorson Ranch, Colorado Springs, CO">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover">
    <link href="/favicons/64x64.png" rel="icon shortcut" sizes="64x64">
    <link href="/favicons/128x128.png" rel="icon shortcut" sizes="128x128">
    <link href="/favicons/192x192.png" rel="icon shortcut" sizes="192x192">
    <link href="/favicons/apple-touch-icon.png" rel="apple-touch-icon" sizes="76x76">
    <link href="/favicons/apple-touch-icon.png" rel="apple-touch-icon" sizes="120x120">
    <link href="/favicons/apple-touch-icon.png" rel="apple-touch-icon" sizes="152x152">
    <link href="/favicons/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180">
    <title>Weather Lorson Ranch, Colorado Springs</title>
    <title>E-ink Weather Dashboard</title>
    <script src="/js/moment.js"></script>
    <script src="/js/moment-timezone.js"></script>
    <script src="/js/mustache.js"></script>
    <script>
        document.write('<link rel="stylesheet" href="/css/main.css?v=' + new Date().getTime() + '">');
        function addScript( src ) {
            let s = document.createElement( 'script' );
            s.setAttribute( 'src', src + "?v=" + new Date().getTime() );
            document.body.appendChild( s );
        }
    </script>
</head>
<body>
<div id="loading">
    loading ...
</div>
<div id="dashboard" class="dashboard" style="display: none">
    <div class="header">
        <h1>Lorson Ranch</h1>
        <p id="updated"></p>
    </div>

    <div id="temperature" class="current"></div>

    <div id="details-a" class="details"></div>

    <div class="section-title">HOURLY FORECAST</div>
    <div id="hourly-forecast" class="hourly"></div>
    <div class="section-title">5-DAY FORECAST</div>
    <div id="daily-forecast" class="daily"></div>
    <div id="details-b" class="details no-bottom"></div>
    <div id="details-c" class="details no-bottom"></div>
    <div id="details-d" class="details no-bottom"></div>
    <div id="details-e" class="details no-bottom"></div>
    <footer id="footer">
        &copy; 2018-2026 zoms.net
    </footer>
</div>

<div id="rainModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('rainModal')">&times;</span>
        <h2 style="margin-top:0;">RAIN DETAILS</h2>
        <div class="modal-details">
            <div><span>Daily Rain</span> <span>0.0 in</span></div>
            <div><span>Hourly Rain</span> <span>0.0 in</span></div>
            <div><span>Event Rain</span> <span>0.0 in</span></div>
            <div><span>Weekly Rain</span> <span>0.0 in</span></div>
            <div><span>Monthly Rain</span> <span>0.05 in</span></div>
            <div><span>Yearly Rain</span> <span>1.12 in</span></div>
            <div><span>Last Rain</span> <span>2026-04-02</span></div>
        </div>
    </div>
</div>
<script id="updated-template" type="text/html">{{updated}}</script>
<script id="footer-template" type="text/html">
    &copy; 2018-{{ year }} zoms.net
</script>
<script id="temperature-template" type="text/html">
    <div class="temp">{{ temp }}{{{ tempLabel }}}</div>
    <div class="cond">{{ conditions }}</div>
    <div class="hl">H: {{ max }}{{{ tempLabel }}} &nbsp;&nbsp; L: {{min}}{{{ tempLabel }}} &nbsp;&nbsp; FEELS LIKE: {{feelslike}}{{{ tempLabel }}}</div>
</script>
<script id="hourly-template" type="text/html">
    <div id="hour{{ id }}" class="hourly-item">
        <div>{{ date }}</div>
        <div style="font-weight: bold; margin-top: 5px;">{{temp}}{{{ tempLabel }}}</div>
    </div>
</script>
<script id="daily-template" type="text/html">
    <div class="daily-item">
        <div style="font-weight: bold; font-size: 1.2em;">{{ date }}</div>
        <div style="margin: 10px 0;">{{ conditions }}</div>
        <div style="font-weight: bold;">H: {{tempmax}}{{{ tempLabel }}}</div>
        <div>L: {{tempmin}}{{{ tempLabel }}}</div>
    </div>
</script>
<script id="details-template" type="text/html">
    <div id="{{id}}" class="details-item">
        <div>{{ name }}</div>
        <div>{{value}}{{{label}}}</div>
    </div>
</script>

<script>
    addScript('/js/util.js');
    addScript('/js/weather.js');
</script>
</body>
</html>
