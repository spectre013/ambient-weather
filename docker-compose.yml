
name: weather
# Define the services (containers)
services:
  weather-server:
    container_name: weather-server
    image: docker.zoms.net/weather/weather-server:v4.0.6
    restart: unless-stopped
    pull_policy: always
    # Expose port 3000 inside the container to port 6001 on the host
    ports:
      - "6001:3000"
    # Set the environment variables
    environment:
      - PORT=3000
      - DB_HOST=10.10.1.120
      - DB_USER=ambient
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=ambient
      - ENV=development
      - LOGLEVEL=Info
      - ALERT_CRON=*/15 * * * *
      - LAT=38.725798
      - LON=-104.66783
      - WEATHER_API=${WEATHER_API}
      - ASSETS=/app/public
    # Attach the container to the custom network
    networks:
      - weather-network
  weather-transfer:
    container_name: weather-transfer
    image: docker.zoms.net/weather/weather-transfer:2.1.5
    restart: unless-stopped
    pull_policy: always
    # Expose port 3000 inside the container to port 6001 on the host
    ports:
      - "7500:8080"
    # Set the environment variables
    environment:
      - PORT=3000
      - DB_HOST=10.10.1.120
      - DB_USER=ambient
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=ambient
      - ENV=development
      - LOGLEVEL=Info
      - ALERT_CRON=*/15 * * * *
      - LAT=38.725798
      - LON=-104.66783
    # Attach the container to the custom network
    networks:
      - weather-network

  weather-ui:
    container_name: weather-ui
    image: docker.zoms.net/weather/weather-ui:v3.0.6
    restart: unless-stopped
    pull_policy: always
    # Expose port 6000 inside the container to port 6000 on the host
    ports:
      - "6000:6000"
    # Attach the container to the custom network
    networks:
      - weather-network

# Define the custom network
networks:
  weather-network:
    driver: bridge

